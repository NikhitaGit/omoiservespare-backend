

spring.application.name=OmoiServespare

# ===============================
# SSRVER
# ===============================
server.port=${PORT:8080}

spring.main.web-application-type=servlet

# ===============================
# DATABASE (PostgreSQL)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Settings (Fix Connection Timeouts)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret=${JWT_SECRET:THIS_IS_A_VERY_LONG_SECRET_KEY_FOR_JWT_256_BITS_SECURITY}


# ==============================
# FLYWAY (must come before JPA)
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=false
spring.flyway.clean-disabled=false
logging.level.org.flywaydb.core=DEBUG

# ===============================
# JPA / HIBERNATE
# ===============================
# spring.jpa.hibernate.ddl-auto=none
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql=true



# ===============================
# EMAIL CONFIGURATION (SMTP)
# ===============================
# Email configuration is handled via SMTP (see GMAIL SMTP CONFIGURATION section below)
# All email credentials are stored securely in HashiCorp Vault

# ===============================   
# TWILIO CONFIG
# ===============================
twilio.account.sid=${TWILIO_SID:dummy_key}
twilio.auth.token=${TWILIO_AUTH_TOKEN:dummy_key}
twilio.phone.number=${TWILIO_PHONE_NUMBER:+10000000000}
twilio.enabled=false



server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
logging.level.org.springframework.web=DEBUG

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# REDIS CONFIGURATION
# ===============================
# Redis is OPTIONAL - app will use in-memory cart if Redis is not available
spring.redis.enabled=${REDIS_ENABLED:false}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=60000


# ===============================
# RAZORPAY PAYMENT GATEWAY
# ===============================
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_1234567890}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:test_secret_key}
payment.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:webhook_secret}

# ===============================
# PAYMENT CONFIGURATION
# ===============================
payment.3ds.enabled=true
payment.fraud-detection.enabled=true

# Fraud Detection Thresholds
fraud.velocity.max-transactions-1h=10
fraud.velocity.max-transactions-24h=50
fraud.velocity.max-amount-1h=50000
fraud.velocity.max-amount-24h=200000

# Order Expiry Configuration
order.pending.expiry-minutes=30
order.cleanup.enabled=true

# ===============================
# HR API INTEGRATION CONFIG
# ===============================
hr.api.enabled=false
hr.api.base-url=https://api.hrcompany.com/v1
hr.api.token=demo-token
hr.api.timeout=30000

resend.api.key=${RESEND_API_KEY}




# ===============================
# KAFKA CONFIGURATION (DISABLED)
# ===============================
# Disable Kafka auto-configuration (Kafka not running)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Dummy values to satisfy placeholder resolution (not actually used)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=coupon-tracking-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Kafka Topics
kafka.topic.coupon-viewed=coupon-viewed-events
kafka.topic.coupon-applied=coupon-applied-events
kafka.topic.coupon-validated=coupon-validated-events
kafka.topic.user-behavior=user-behavior-events

# Make Kafka optional - app will start even if Kafka is not running
spring.kafka.admin.fail-fast=false

#Admin Secret Key
# app.admin.secret-key=qFZMWtm2ihlAn15TDwkv7zEyO9RH6SjG

# ===============================
# GOOGLE MAPS API CONFIGURATION
# ===============================
# Get your API key from: https://console.cloud.google.com/google/maps-apis
# Enable: Geocoding API, Maps JavaScript API
google.maps.api.key=${GOOGLE_MAPS_API_KEY:dummy key}
google.maps.api.enabled=true
google.maps.api.timeout=5000

# ===============================
# SMTP EMAIL CONFIG (Gmail)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.username=${SENDER_USERNAME}
spring.mail.password=${SENDER_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=60000
spring.mail.properties.mail.smtp.timeout=60000
spring.mail.properties.mail.smtp.writetimeout=60000

# Email Configuration
mail.from=${FROM_MAIL}
email.from.address=${FROM_ADDRESS}
email.from.name=${FROM_NAME}

# ===============================
# VAULT CONFIGURATION (DISABLED FOR PRODUCTION)
# ===============================
spring.cloud.vault.enabled=false

# spring.cloud.vault.kv.enabled=true
# spring.cloud.vault.kv.backend=secret
# spring.cloud.vault.kv.default-context=OmoiServespare

# FROM email address from Vault
# mail.from=${FROM_MAIL}

logging.level.org.springframework.mail=DEBUG
logging.level.org.eclipse.angus.mail=DEBUG

logging.level.root=INFO