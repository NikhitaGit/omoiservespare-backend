# Application properties WITHOUT Kafka
# Use this profile to run without Kafka: mvn spring-boot:run -Dspring-boot.run.profiles=no-kafka

# Copy all your existing properties here
spring.application.name=omoiservespare

# Disable Kafka auto-configuration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/omoiservespare

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/omoiservespare
spring.datasource.username=postgres
spring.datasource.password=your_password

# JWT
jwt.secret=your_jwt_secret_key_here
jwt.expiration=86400000

# Admin Secret Key
admin.secret.key=qFZMWtm2ihlAn15TDwkv7zEyO9RH6SjG

# Server
server.port=8080
