# ===============================
# TEST CONFIGURATION
# ===============================
# This file is ONLY used during testing
# Production deployment uses environment variables

# ===============================
# DATABASE (H2 In-Memory for Testing)
# ===============================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ===============================
# FLYWAY (Disabled for tests)
# ===============================
spring.flyway.enabled=false
spring.autoconfigure.exclude=org.flywaydb.core.autoconfigure.FlywayAutoConfiguration

# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret=testSecretKeyForJWTTokenSigningInTestEnvironment123456789

# ===============================
# DISABLE EXTERNAL SERVICES
# ===============================
# Email via SMTP is disabled for tests (no actual emails sent)
twilio.enabled=false
hr.api.enabled=false
payment.fraud-detection.enabled=false

# ===============================
# KAFKA (Disabled for tests)
# ===============================
spring.kafka.bootstrap-servers=localhost:9092
